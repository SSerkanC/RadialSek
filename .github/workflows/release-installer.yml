name: Build and Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK 5
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "5.0.x"

      - name: Publish app
        shell: pwsh
        run: .\release\publish_release.ps1

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $refType = "${{ github.ref_type }}"
          $refName = "${{ github.ref_name }}"
          [xml]$projectXml = Get-Content "radial_sek.csproj"
          $version = $projectXml.Project.PropertyGroup.Version | Select-Object -First 1

          if (-not $version) {
            throw "Project version not found in radial_sek.csproj"
          }

          if ($refType -eq "tag" -and $refName) {
            if ($refName.StartsWith("v")) {
              $version = $refName.Substring(1)
            } else {
              $version = $refName
            }
          }

          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Installer version: $version"

      - name: Build installer
        shell: pwsh
        run: .\release\build_installer.ps1 -Version "${{ steps.version.outputs.value }}"

      - name: Create stable latest installer filename
        shell: pwsh
        run: |
          $installer = Get-ChildItem "release\RadialSek_Setup_*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "Installer dosyasi bulunamadi."
          }
          Copy-Item $installer.FullName "release\RadialSek_Setup_Latest.exe" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadialSek-Installer
          path: release/RadialSek_Setup_*.exe
          if-no-files-found: error

      - name: Create GitHub Release and upload installer
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/RadialSek_Setup_*.exe
          generate_release_notes: true
